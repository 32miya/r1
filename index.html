<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>ラップバトル！</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a2e;font-family:'Arial Black','Impact',sans-serif;color:#fff;}


.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;gap:12px;padding:env(safe-area-inset-top) 16px 16px;
  overflow-y:auto;z-index:100;}
.hidden{display:none!important;}
.sec-label{font-size:.75rem;font-weight:900;color:#FFD166;letter-spacing:.15em;align-self:flex-start;}


#start{background:linear-gradient(160deg,#3a1a6e,#1a0a2e);}
#start h1{font-size:clamp(1.8rem,7vw,2.6rem);color:#FFD166;text-align:center;
  text-shadow:0 0 30px rgba(255,209,102,.8);margin-top:12px;}
#start .sub{color:#9AB;font-size:.85rem;text-align:center;}
#char-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:360px;}
.char-card{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:#fff;border-radius:14px;padding:8px 8px 6px;
  border:4px solid transparent;cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.3);}
.char-card.selected{border-color:#FFD166;transform:scale(1.08);box-shadow:0 0 22px rgba(255,209,102,.8);}
.char-card-img{width:50px;height:133px;background-size:200px 133px;background-repeat:no-repeat;
  background-position:0 0;mix-blend-mode:multiply;}
#prev-rabbit{background-image:url('assets/rabbit.jpeg');}
#prev-fox{background-image:url('assets/fox.jpeg');}
#prev-panda{background-image:url('assets/panda.jpeg');}
#prev-rhino{background-image:url('assets/rhino.jpeg');}
#prev-husky{background-image:url('assets/husky.jpeg');}
#prev-horse{background-image:url('assets/horse.jpeg');}
.char-name{font-size:.8rem;font-weight:900;color:#333;}
#diff-row{display:flex;gap:8px;justify-content:center;width:100%;}
.diff-btn{flex:1;max-width:110px;padding:8px 4px;border-radius:12px;border:3px solid transparent;
  background:rgba(255,255,255,.08);color:#fff;font-size:.8rem;font-weight:900;
  cursor:pointer;text-align:center;line-height:1.5;
  transition:border-color .15s,transform .12s,box-shadow .15s;}
.diff-btn.selected{border-color:#6BFF8A;transform:scale(1.06);box-shadow:0 0 16px rgba(107,255,138,.7);}
#vol-row{display:flex;align-items:center;gap:10px;width:100%;}
#vol-row span{font-size:.85rem;color:#9AB;}
#vol-slider{flex:1;accent-color:#FFD166;cursor:pointer;}
#start-btn{padding:14px 50px;background:linear-gradient(135deg,#FF6BAD,#FFD166);
  color:#1A0008;border:none;border-radius:60px;font-size:1.1rem;font-weight:900;
  cursor:pointer;letter-spacing:.1em;box-shadow:0 0 36px rgba(255,100,170,.5);}


#stage-select{background:linear-gradient(160deg,#0a2a4e,#1a0a2e);}
#stage-select h2{font-size:1.6rem;color:#FFD166;margin-top:10px;}
#stage-list{width:100%;display:flex;flex-direction:column;gap:10px;}
.stage-card{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:14px;border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);cursor:pointer;
  transition:border-color .15s,transform .1s;}
.stage-card.unlocked:hover,.stage-card.unlocked:active{border-color:#FFD166;transform:scale(1.02);}
.stage-card.locked{opacity:.4;cursor:default;}
.stage-card.current-stage{border-color:#6BFF8A;box-shadow:0 0 14px rgba(107,255,138,.5);}
.stage-info{flex:1;}
.stage-num{font-size:.7rem;color:#9AB;letter-spacing:.1em;}
.stage-name{font-size:.95rem;font-weight:900;margin:2px 0;}
.stage-dots{display:flex;gap:6px;margin-top:4px;}
.sdot{font-size:.9rem;}
.sdot.done{color:#FFD166;}
.sdot.todo{color:rgba(255,255,255,.3);}
.stage-thumb{width:40px;height:107px;background-size:160px 107px;
  background-repeat:no-repeat;background-position:0 0;mix-blend-mode:multiply;
  background-color:#fff;border-radius:8px;flex-shrink:0;}
#back-from-stage{padding:10px 30px;background:rgba(255,255,255,.1);color:#9AB;
  border:none;border-radius:30px;font-size:.85rem;cursor:pointer;margin-top:4px;}


#game{display:none;flex-direction:column;width:100%;height:100%;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
#char-zone{flex:0 0 50%;display:flex;align-items:stretch;
  background:linear-gradient(180deg,#c090f8 0%,#f0d0ff 45%,#fff8f0 100%);
  position:relative;overflow:hidden;border-bottom:4px solid #FFD166;}
#char-zone::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 140px 200px at 22% 92%,rgba(255,200,60,.55) 0%,transparent 60%),
             radial-gradient(ellipse 140px 200px at 78% 92%,rgba(160,80,255,.5)  0%,transparent 60%);
  pointer-events:none;}
#teacher-char-zone,#player-char-zone{flex:1;display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:4px;position:relative;}
.role-tag{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-size:.65rem;font-weight:900;padding:2px 10px;border-radius:20px;
  letter-spacing:.08em;white-space:nowrap;z-index:2;}
.role-tag.teacher{background:#4a6fcc;color:#fff;}
.role-tag.you{background:#cc4a6f;color:#fff;}
#rating-zone{flex:0 0 88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
#rating-bar{width:66px;height:11px;background:#111;border:2px solid #FFD166;border-radius:6px;overflow:hidden;}
#rating-fill{height:100%;background:linear-gradient(90deg,#FF4444,#FFD166,#6BFF8A);transition:width .3s;border-radius:4px;}
#rating-label{font-size:.95rem;font-weight:900;}
.rl-cool{color:#FFD166;text-shadow:0 0 12px #FFD166;}
.rl-good{color:#6BFF8A;text-shadow:0 0 8px #6BFF8A;}
.rl-bad{color:#FF8844;}
.rl-awful{color:#FF4444;}
#song-info-bar{font-size:.6rem;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;}
.char-sprite{height:360px;width:135px;background-size:540px 360px;
  background-repeat:no-repeat;mix-blend-mode:multiply;flex-shrink:0;
  clip-path:inset(0 5px 0 0);}
#teacher-sprite{background-image:url('assets/fox.jpeg');}
#player-sprite{background-image:url('assets/panda.jpeg');}
.s0{background-position:0px 0px;}
.s1{background-position:-135px 0px;}
.s2{background-position:-270px 0px;}
.s3{background-position:-405px 0px;}
@keyframes sb{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes sp{0%{transform:scale(1)}35%{transform:scale(1.15)}100%{transform:scale(1)}}
.sprite-singing{animation:sb .6s ease-in-out infinite;}
.sprite-popping{animation:sp .25s ease-out;}
#lyrics-bar{flex-shrink:0;background:#0a0020;border-top:2px solid #FFD166;
  border-bottom:2px solid #FFD166;padding:4px 10px;min-height:38px;display:flex;align-items:center;}
#lyrics-text{font-size:clamp(.65rem,2.4vw,.9rem);color:#FFD166;line-height:1.5;white-space:pre-line;}
#highway-wrap{flex-shrink:0;position:relative;}
canvas#hw{display:block;width:100%;}
#phase-banner{flex-shrink:0;height:24px;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:900;letter-spacing:.12em;}
#phase-banner.teacher{background:#2a1a5e;color:#AAF;}
#phase-banner.player{background:#1a3a1a;color:#6BFF8A;}
#phase-banner.intro{background:#1a1a1a;color:#888;}
#btns{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:5px;padding:5px;}
.btn{border-radius:14px;border:3px solid rgba(255,255,255,.2);
  font-size:clamp(1.2rem,4vw,1.6rem);font-weight:900;cursor:pointer;
  transition:transform .06s,filter .06s;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:2px;line-height:1;}
.btn .bl{font-size:.5rem;font-weight:700;opacity:.7;}
.btn:active,.btn.pressed{transform:scale(.85);filter:brightness(1.6);}
.btn.teacher-flash{transform:scale(.88)!important;filter:brightness(2.4) saturate(1.5)!important;
  box-shadow:0 0 28px rgba(255,255,255,.9)!important;transition:none!important;}
#b0{background:#C89000;color:#1A0A00;box-shadow:0 4px 16px rgba(255,209,102,.7);}
#b1{background:#1a7a3a;color:#DFFFEC;box-shadow:0 4px 16px rgba(107,255,138,.5);}
#b2{background:#1a50c0;color:#DDEEFF;box-shadow:0 4px 16px rgba(68,170,255,.5);}
#b3{background:#b01828;color:#FFE0E4;box-shadow:0 4px 16px rgba(255,85,102,.5);}
#game-vol-wrap{position:absolute;top:6px;left:50%;transform:translateX(-50%);display:flex;align-items:center;
  gap:5px;z-index:10;opacity:.65;}
#game-vol-wrap span{font-size:.6rem;color:#666;}
#gvol{width:55px;accent-color:#FFD166;cursor:pointer;}
@keyframes hp{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.3);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-190%) scale(.8);}}
.hit-pop{position:fixed;pointer-events:none;font-size:1.4rem;font-weight:900;
  left:50%;top:40%;transform:translate(-50%,-50%);animation:hp .6s ease-out forwards;z-index:50;}
.hp-cool{color:#FFD166;text-shadow:0 0 18px #FFD166;}
.hp-good{color:#6BFF8A;text-shadow:0 0 14px #6BFF8A;}
.hp-bad{color:#FF8844;}
.hp-awful{color:#FF4444;}


#result{display:none;position:fixed;inset:0;z-index:200;overflow:hidden;
  flex-direction:column;align-items:center;justify-content:flex-start;
  padding:env(safe-area-inset-top,20px) 20px 20px;overflow-y:auto;}
#result-particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
#result-bg{position:fixed;inset:0;z-index:0;transition:background 0.5s;}
#result-content{position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;width:100%;max-width:400px;gap:10px;padding-top:8px;}


#result-char-card{
  background:linear-gradient(180deg,#c090f8 0%,#f0d0ff 50%,#fff8f0 100%);
  border-radius:20px;padding:8px 12px 0;
  box-shadow:0 0 30px rgba(200,144,248,.5);
  overflow:hidden;display:inline-block;}
#result-char-sprite{width:135px;height:240px;background-size:540px 360px;
  background-repeat:no-repeat;background-position:0 0;
  mix-blend-mode:multiply;display:block;
  clip-path:inset(0 5px 0 0);}
@keyframes rc-enter{0%{transform:scale(0.3) translateY(40px);opacity:0}
  60%{transform:scale(1.15) translateY(-8px);opacity:1}
  100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes rc-bounce{0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-12px) scale(1.05)}}
.result-anim-enter{animation:rc-enter .55s cubic-bezier(.2,.8,.3,1.2) forwards;}
.result-anim-bounce{animation:rc-bounce 1.8s ease-in-out infinite;}


#result-rank-wrap{text-align:center;}
#result-rank-emoji{font-size:3rem;display:block;line-height:1;}
#result-rank{font-size:2.6rem;font-weight:900;letter-spacing:.06em;margin:4px 0;}
@keyframes rank-pop{0%{transform:scale(0);opacity:0}
  65%{transform:scale(1.2);opacity:1}
  85%{transform:scale(.95)}
  100%{transform:scale(1);opacity:1}}
.rank-pop{animation:rank-pop .6s cubic-bezier(.2,.8,.3,1.2) .3s both;}
@keyframes glow-pulse{0%,100%{text-shadow:0 0 20px currentColor,0 0 40px currentColor}
  50%{text-shadow:0 0 40px currentColor,0 0 80px currentColor,0 0 120px currentColor}}


#result-score-big{font-size:3rem;font-weight:900;color:#FFD166;
  text-shadow:0 0 24px #FFD166;letter-spacing:.04em;line-height:1;}
#result-score-label{font-size:.65rem;color:rgba(255,255,255,.5);letter-spacing:.12em;margin-top:-4px;}


#result-song-title{font-size:.85rem;color:#fff;text-align:center;opacity:.85;
  background:rgba(255,255,255,.1);padding:5px 16px;border-radius:20px;max-width:90%;}


#result-bars-wrap{width:100%;display:flex;flex-direction:column;gap:6px;
  background:rgba(0,0,0,.3);border-radius:14px;padding:12px 14px;}
.res-bar-row{display:flex;align-items:center;gap:8px;font-size:.75rem;}
.res-bar-label{width:36px;font-weight:900;text-align:right;flex-shrink:0;}
.res-bar-track{flex:1;height:12px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden;}
.res-bar-fill{height:100%;border-radius:6px;width:0;transition:width .8s cubic-bezier(.2,1,.3,1);}
.res-bar-count{width:28px;text-align:left;font-weight:700;flex-shrink:0;}
.lc-cool{color:#FFD166;}.lf-cool{background:linear-gradient(90deg,#C89000,#FFD166);}
.lc-good{color:#6BFF8A;}.lf-good{background:linear-gradient(90deg,#1a7a3a,#6BFF8A);}
.lc-bad{color:#FF8844;}.lf-bad{background:linear-gradient(90deg,#884400,#FF8844);}
.lc-miss{color:#FF5566;}.lf-miss{background:linear-gradient(90deg,#880022,#FF5566);}


#result-diff-line{font-size:.7rem;color:rgba(255,255,255,.5);text-align:center;}


#result-btns{width:100%;display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.res-btn{padding:14px 20px;border:none;border-radius:40px;font-size:.95rem;font-weight:900;
  cursor:pointer;letter-spacing:.08em;width:100%;
  box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .1s,filter .1s;}
.res-btn:active{transform:scale(.95);filter:brightness(1.3);}
#retry-btn{background:linear-gradient(135deg,#FFD166,#C89000);color:#1A0A00;}
#next-song-btn{background:linear-gradient(135deg,#6BFF8A,#1a7a3a);color:#002200;}
#stage-clear-btn{background:linear-gradient(135deg,#FFD166,#FF6BAD,#a855f7);color:#fff;}
#title-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.15);}


.rank-cool #result-rank{color:#FFD166;animation:rank-pop .6s cubic-bezier(.2,.8,.3,1.2) .3s both,glow-pulse 2s ease-in-out 1s infinite;}
.rank-cool #result-score-big{color:#FFD166;text-shadow:0 0 30px #FFD166;}
.rank-good #result-rank{color:#6BFF8A;animation:rank-pop .6s cubic-bezier(.2,.8,.3,1.2) .3s both,glow-pulse 2s ease-in-out 1s infinite;}
.rank-good #result-score-big{color:#6BFF8A;text-shadow:0 0 24px #6BFF8A;}
.rank-bad #result-rank{color:#FF8844;animation:rank-pop .6s cubic-bezier(.2,.8,.3,1.2) .3s both;}
.rank-bad #result-score-big{color:#FF8844;}
.rank-awful #result-rank{color:#FF5566;animation:rank-pop .6s cubic-bezier(.2,.8,.3,1.2) .3s both;}
.rank-awful #result-score-big{color:#FF5566;}


#result-title-wrap{text-align:center;margin:2px 0 4px;}
#result-title-emoji{font-size:1.6rem;display:block;line-height:1.2;}
#result-title-text{font-size:1.05rem;font-weight:900;color:#FFD166;
  text-shadow:0 0 14px rgba(255,209,102,.7);letter-spacing:.06em;margin:2px 0;}
.result-title-sublabel{font-size:.55rem;color:rgba(255,255,255,.4);letter-spacing:.2em;}


#result-advance-wrap{width:100%;margin-top:4px;}
#result-advance-text{font-size:.62rem;color:rgba(255,255,255,.45);text-align:center;margin-bottom:4px;letter-spacing:.06em;}
#result-advance-track{width:100%;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;}
#result-advance-fill{height:100%;background:linear-gradient(90deg,#FFD166,#6BFF8A);width:0%;}
</style>
</head>
<body>
<audio id="bgm-player" preload="none"></audio>

<!-- スタート画面 -->
<div id="start" class="screen">
  <div style="font-size:2.8rem">🦊🐼🐰</div>
  <h1>ラップバトル！</h1>
  <div class="sub">ステージ制リズムゲーム — 全6ステージ11曲</div>
  <div class="sec-label">▶ キャラクター選択</div>
  <div id="char-row">
    <div class="char-card" data-char="rabbit">
      <div class="char-card-img" id="prev-rabbit"></div>
      <div class="char-name">ウサギ</div>
    </div>
    <div class="char-card selected" data-char="panda">
      <div class="char-card-img" id="prev-panda"></div>
      <div class="char-name">パンダ</div>
    </div>
    <div class="char-card" data-char="fox">
      <div class="char-card-img" id="prev-fox"></div>
      <div class="char-name">キツネ</div>
    </div>
    <div class="char-card" data-char="rhino">
      <div class="char-card-img" id="prev-rhino"></div>
      <div class="char-name">サイ</div>
    </div>
    <div class="char-card" data-char="husky">
      <div class="char-card-img" id="prev-husky"></div>
      <div class="char-name">ハスキー</div>
    </div>
    <div class="char-card" data-char="horse">
      <div class="char-card-img" id="prev-horse"></div>
      <div class="char-name">ホース</div>
    </div>
  </div>
  <div class="sec-label">▶ 難易度選択</div>
  <div id="diff-row">
    <button class="diff-btn" data-diff="easy">🌱 初級<br><small>BPM控えめ</small></button>
    <button class="diff-btn selected" data-diff="normal">⭐ 普通<br><small>標準</small></button>
    <button class="diff-btn" data-diff="hard">🔥 上級<br><small>激ムズ</small></button>
  </div>
  <div class="sec-label">▶ ボリューム</div>
  <div id="vol-row"><span>🔇</span><input type="range" id="vol-slider" min="0" max="100" value="80"><span>🔊</span></div>
  <button id="start-btn">▶ ステージ選択へ</button>
</div>

<!-- ステージ選択 -->
<div id="stage-select" class="screen hidden">
  <h2>ステージ選択</h2>
  <div id="stage-list"></div>
  <button id="back-from-stage">← 設定に戻る</button>
</div>

<!-- ゲーム -->
<div id="game">
  <div id="char-zone" style="position:relative;">
    <div id="game-vol-wrap">
      <span>🔊</span><input type="range" id="gvol" min="0" max="100" value="80">
    </div>
    <div id="teacher-char-zone">
      <div class="role-tag teacher" id="teacher-label">先生</div>
      <div id="teacher-sprite" class="char-sprite s0"></div>
    </div>
    <div id="rating-zone">
      <div id="rating-label" class="rl-good">グッド</div>
      <div id="rating-bar"><div id="rating-fill" style="width:50%"></div></div>
      <div id="score-disp" style="font-size:.7rem;color:#9AB;margin-top:1px">0</div>
      <div id="song-info-bar"></div>
    </div>
    <div id="player-char-zone">
      <div class="role-tag you" id="player-label">あなた</div>
      <div id="player-sprite" class="char-sprite s0"></div>
    </div>
  </div>
  <div id="lyrics-bar"><div id="lyrics-text">♪ ♪ ♪</div></div>
  <div id="highway-wrap"><canvas id="hw"></canvas></div>
  <div id="phase-banner" class="intro">♪ イントロ ♪</div>
  <div id="btns">
    <button class="btn" id="b0" data-lane="0">□<span class="bl">ドン</span></button>
    <button class="btn" id="b1" data-lane="1">△<span class="bl">タン</span></button>
    <button class="btn" id="b2" data-lane="3">×<span class="bl">チャッ</span></button>
    <button class="btn" id="b3" data-lane="2">○<span class="bl">パン</span></button>
  </div>
</div>

<!-- リザルト -->
<div id="result">
  <canvas id="result-particles"></canvas>
  <div id="result-bg"></div>
  <div id="result-content">
    <div id="result-char-card"><div id="result-char-sprite" class="s2"></div></div>
    <div id="result-rank-wrap">
      <span id="result-rank-emoji">🌟</span>
      <h2 id="result-rank">クール！</h2>
    </div>
    <div id="result-title-wrap">
      <span id="result-title-emoji">🌱</span>
      <div id="result-title-text">リズム見習い</div>
      <div class="result-title-sublabel">称　号</div>
    </div>
    <div id="result-score-big">0</div>
    <div id="result-score-label">累計スコア</div>
    <div id="result-song-title">—</div>
    <div id="result-bars-wrap">
      <div class="res-bar-row">
        <span class="res-bar-label lc-cool">クール</span>
        <div class="res-bar-track"><div class="res-bar-fill lf-cool" id="bar-cool"></div></div>
        <span class="res-bar-count lc-cool" id="cnt-cool">0</span>
      </div>
      <div class="res-bar-row">
        <span class="res-bar-label lc-good">グッド</span>
        <div class="res-bar-track"><div class="res-bar-fill lf-good" id="bar-good"></div></div>
        <span class="res-bar-count lc-good" id="cnt-good">0</span>
      </div>

// ── ローカル音声 ──
const bgmAudio=document.getElementById('bgm-player');
let bgmCurrentSrc=null;
let bgmMediaSource=null; // MediaElementAudioSourceNode（iOS音量制御のためWeb Audioグラフに接続）
function isLocalAudioSong(){ return !!curSong().audioSrc; }
function bgmPlay(src,vol){ bgmAudio.src=src;bgmAudio.volume=vol;bgmAudio.currentTime=0;bgmAudio.play().catch(()=>{}); }
function bgmStop(){ bgmAudio.pause();bgmAudio.currentTime=0; }
function preloadBgm(src){ if(bgmCurrentSrc===src)return; bgmCurrentSrc=src;bgmAudio.src=src;bgmAudio.load(); }
// bgmAudioをWeb Audioグラフに接続してmasterGainで音量制御（iOS対応）
function connectBgmToGraph(){
  if(!actx||bgmMediaSource) return;
  try{ bgmMediaSource=actx.createMediaElementSource(bgmAudio); bgmMediaSource.connect(masterGain); }
  catch(e){ /* 接続失敗時はbgmAudio.volumeにフォールバック */ }
}

let actx, noiseBuf, masterGain;
function bootAudio(){
  if(actx){actx.resume();return;}
  actx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();masterGain.gain.value=masterVol;masterGain.connect(actx.destination);
  const len=Math.ceil(actx.sampleRate*.6);noiseBuf=actx.createBuffer(1,len,actx.sampleRate);
  const d=noiseBuf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
}
function G(v,t){const g=actx.createGain();g.gain.setValueAtTime(v,t);return g;}
function conn(...ns){for(let i=0;i<ns.length-1;i++)ns[i].connect(ns[i+1]);}
const DST=()=>masterGain;

function playKick(t){
  const o=actx.createOscillator(),g=G(2.2,t);
  o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(.001,t+.38);
  g.gain.exponentialRampToValueAtTime(.001,t+.38);conn(o,g,DST());o.start(t);o.stop(t+.4);
}
function playSnare(t){
  const ns=actx.createBufferSource();ns.buffer=noiseBuf;
  const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=2400;f.Q.value=.8;
  const g=G(1.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
  conn(ns,f,g,DST());ns.start(t);ns.stop(t+.15);
  const o=actx.createOscillator(),og=G(.6,t);o.frequency.value=180;
  og.gain.exponentialRampToValueAtTime(.001,t+.07);conn(o,og,DST());o.start(t);o.stop(t+.08);
}
function playHat(t,open=false){
  const dur=open?.14:.035,hpf=actx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=7200;
  const g=G(open?.28:.18,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);conn(hpf,g,DST());
  [2,3,4.16,5.43,6.79].forEach(r=>{const o=actx.createOscillator();o.type='square';o.frequency.value=42*r;conn(o,hpf);o.start(t);o.stop(t+dur);});
}
function playBass(t,freq){
  const o=actx.createOscillator();o.type='sawtooth';o.frequency.value=freq;
  const lpf=actx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=380;
  const g=G(.7,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);conn(o,lpf,g,DST());o.start(t);o.stop(t+.3);
}
function playChord(t,freqs,vol=.22,dur=.14){
  freqs.forEach(f=>{const o=actx.createOscillator();o.type='triangle';o.frequency.value=f;
    const g=G(vol/freqs.length,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    conn(o,g,DST());o.start(t);o.stop(t+dur+.05);});
}

function playHitVoice(t,lane,grade){
  // グレードで音色を変える: cool=明るい高音, good=通常, bad=くぐもった低音
  const pitch = grade==='cool'?1.6 : grade==='bad'?.65 : 1;
  const vol   = grade==='cool'?1.3 : grade==='bad'?.55 : 1;
  const v=[
    ()=>{const o=actx.createOscillator(),g=G(vol,t);o.type='sine';o.frequency.setValueAtTime(120*pitch,t);o.frequency.exponentialRampToValueAtTime(40*pitch,t+.14);g.gain.exponentialRampToValueAtTime(.001,t+.17);conn(o,g,DST());o.start(t);o.stop(t+.19);},
    ()=>{const o=actx.createOscillator(),g=G(.7*vol,t);o.type='square';o.frequency.setValueAtTime(440*pitch,t);o.frequency.exponentialRampToValueAtTime(180*pitch,t+.09);g.gain.exponentialRampToValueAtTime(.001,t+.11);conn(o,g,DST());o.start(t);o.stop(t+.13);},
    ()=>{const ns=actx.createBufferSource();ns.buffer=noiseBuf;const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=3000*pitch;f.Q.value=1.5;const g=G(.8*vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);conn(ns,f,g,DST());ns.start(t);ns.stop(t+.08);},
    ()=>{const o=actx.createOscillator(),g=G(.9*vol,t);o.type='sine';o.frequency.setValueAtTime(80*pitch,t);o.frequency.exponentialRampToValueAtTime(30*pitch,t+.18);g.gain.exponentialRampToValueAtTime(.001,t+.21);conn(o,g,DST());o.start(t);o.stop(t+.23);},
  ];
  v[lane]();
  // クール時だけキラリとした倍音を追加
  if(grade==='cool'){
    const oh=actx.createOscillator(),gh=G(.35,t);
    oh.type='sine';oh.frequency.value=880;
    gh.gain.exponentialRampToValueAtTime(.001,t+.12);
    conn(oh,gh,DST());oh.start(t);oh.stop(t+.13);
  }
}
function playMissSound(){
  if(!actx) return;
  const t=actx.currentTime;
  // 下降する不協和ノイズバースト（明確な「外れ」音）
  const o=actx.createOscillator(),g=G(.7,t);
  o.type='sawtooth';
  o.frequency.setValueAtTime(180,t);
  o.frequency.exponentialRampToValueAtTime(60,t+.18);
  g.gain.setValueAtTime(.7,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
  conn(o,g,DST());o.start(t);o.stop(t+.22);
  // 同時に少しズレた音で不協和感を出す
  const o2=actx.createOscillator(),g2=G(.4,t);
  o2.type='sawtooth';
  o2.frequency.setValueAtTime(190,t);
  o2.frequency.exponentialRampToValueAtTime(64,t+.18);
  g2.gain.exponentialRampToValueAtTime(.001,t+.16);
  conn(o2,g2,DST());o2.start(t);o2.stop(t+.18);
}

function curSong(){return SONGS[currentSongId];}
function getSongTeacher(song){
  const t=song.teacher;
  if(t===selectedChar) return t==='rabbit'?'fox':'rabbit';
  return t;
}

function buildDrumEvents(){
  const s=curSong();
  drumEvts=[];
  const bars=SONG_BEATS/4;
  for(let bar=0;bar<bars;bar++){
    for(let step=0;step<16;step++){
      const t=(bar*16+step)*S,ev={t};
      if(s.drumK[step])  ev.kick=true;
      if(s.drumS[step])  ev.snare=true;
      if(s.drumH[step])  ev.hat=true;
      if(s.drumOH&&s.drumOH[step]) ev.openHat=true;
      if(s.bass[step]>0) ev.bass=s.bass[step];
      if(step===0)  ev.chord=s.chords[bar%s.chords.length];
      if(step===8)  ev.chord2=s.chords[(bar+4)%s.chords.length];
      drumEvts.push(ev);
    }
  }
}

function buildMelodyEvents(){ melodyEvts=[]; }

function scheduleSong(){
  if(!gameActive) return;
  const songNow=actx.currentTime-songStart;
  const AHEAD=0.22;
  // ドラム＋メロディ合成（ローカル音声の曲はスキップ）
  if(!isLocalAudioSong()){
    while(schedPtr<drumEvts.length&&drumEvts[schedPtr].t<songNow+AHEAD){
      const ev=drumEvts[schedPtr];const t=songStart+ev.t;
      if(t<actx.currentTime-.01){schedPtr++;continue;}
      if(ev.kick)    playKick(t);
      if(ev.snare)   playSnare(t);
      if(ev.hat)     playHat(t,false);
      if(ev.openHat) playHat(t,true);
      if(ev.bass)    playBass(t,ev.bass);
      if(ev.chord)   playChord(t,ev.chord,.22,.12);
      if(ev.chord2)  playChord(t,ev.chord2,.16,.1);
      schedPtr++;
    }
    while(melodyPtr<melodyEvts.length){melodyPtr++;}
  }
  // 先生ノート自動演奏＋ボタンフラッシュ
  const songT=actx.currentTime-songStart;
  notes.forEach(n=>{
    if(n.isTeacher&&!n.autoPlayed&&n.time<songT+AHEAD){
      const t=songStart+n.time;if(t>=actx.currentTime-.01&&!isLocalAudioSong())playHitVoice(t,n.lane);
      n.autoPlayed=true;
      // ヒットタイミングにボタンを光らせる
      const delay=Math.max(0,(t-actx.currentTime)*1000);
      setTimeout(()=>{
        const btn=document.querySelector(`.btn[data-lane="${n.lane}"]`);
        if(btn){btn.classList.add('teacher-flash');setTimeout(()=>btn.classList.remove('teacher-flash'),220);}
      },delay);
    }
  });
  if(songNow>=SONG_DUR){endSong();return;}
  schedTimer=setTimeout(scheduleSong,18);
}

function makeChart(){
  const s=curSong();
  let phrases;
  if(s.audioSrc){
    // MP3曲: 難易度別の専用phrasesを使用（BPM変更なし）
    const src=currentDiff==='easy'?s.phrasesEasy:currentDiff==='hard'?s.phrasesHard:s.phrases;
    phrases=(src||s.phrases).map(ph=>ph.map(n=>({...n})));
  } else {
    phrases=s.phrases.map(ph=>{
      let arr=ph.map(n=>({...n}));
      if(currentDiff==='easy')      arr=arr.filter(n=>n.b===Math.floor(n.b));
      else if(currentDiff==='hard') arr=addHardNotes(arr,s.id);
      return arr;
    });
  }
  const ns=[];const introB=16;
  phrases.forEach((ph,pi)=>{
    const ts=introB+pi*16,ps=introB+pi*16+8;
    ph.forEach(n=>{
      ns.push({beat:ts+n.b,lane:n.l,isTeacher:true, autoPlayed:false,hit:false,missed:false});
      ns.push({beat:ps+n.b,lane:n.l,isTeacher:false,hit:false,missed:false});
    });
  });
  ns.forEach(n=>{n.time=n.beat*B;});
  ns.sort((a,b)=>a.time-b.time);
  return ns;
}
function addHardNotes(arr,songId){
  const density=Math.min(songId*.5+1,4);
  const extra=[];
  for(let i=1;i<arr.length;i++){
    const gap=arr[i].b-arr[i-1].b;
    if(gap>0.5&&extra.length<density){
      extra.push({b:(arr[i-1].b+arr[i].b)/2,l:(arr[i].l+2)%4});
    }
  }
  return [...arr,...extra].sort((a,b)=>a.b-b.b);
}

// ══════════════════════════════════════════════════
//  キャンバス ノートハイウェイ
// ══════════════════════════════════════════════════
const HW_H=140,HIT_X=80,SCROLL_SPD=180,NOTE_W=52;
const LANE_COLORS=['#FFD166','#6BFF8A','#FF5566','#44AAFF'];
const LANE_LABELS=['□','△','○','×'];
let canvas,c2d;
function initCanvas(){
  canvas=document.getElementById('hw');
  canvas.height=HW_H;canvas.width=window.innerWidth;c2d=canvas.getContext('2d');
}
function drawHighway(st){
  const W=canvas.width,LH=HW_H/4;
  // 背景
  c2d.fillStyle='#12063a';c2d.fillRect(0,0,W,HW_H);
  // レーンストライプ
  for(let i=0;i<4;i++){
    c2d.fillStyle=`rgba(${i===0?'255,200,0':i===1?'80,255,120':i===2?'255,60,80':'60,140,255'},.07)`;
    c2d.fillRect(0,i*LH,W,LH);
  }
  // レーン区切り線
  c2d.strokeStyle='rgba(255,255,255,.22)';c2d.lineWidth=1;
  for(let i=1;i<4;i++){c2d.beginPath();c2d.moveTo(0,i*LH);c2d.lineTo(W,i*LH);c2d.stroke();}
  // ヒットライン発光
  const grd=c2d.createLinearGradient(HIT_X-36,0,HIT_X+36,0);
  grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(.5,'rgba(255,255,255,.18)');grd.addColorStop(1,'rgba(255,255,255,0)');
  c2d.fillStyle=grd;c2d.fillRect(HIT_X-36,0,72,HW_H);
  c2d.strokeStyle='rgba(255,255,255,1)';c2d.lineWidth=2.5;c2d.beginPath();c2d.moveTo(HIT_X,0);c2d.lineTo(HIT_X,HW_H);c2d.stroke();
  // レーンラベル
  for(let i=0;i<4;i++){
    c2d.shadowColor=LANE_COLORS[i];c2d.shadowBlur=8;
    c2d.fillStyle=LANE_COLORS[i];c2d.font='bold 14px Arial';c2d.textAlign='center';
    c2d.fillText(LANE_LABELS[i],HIT_X-28,i*LH+LH*.65);
    c2d.shadowBlur=0;
  }
  // ノーツ描画
  notes.forEach(n=>{
    if(n.hit||n.missed) return;
    const x=HIT_X+(n.time-st)*SCROLL_SPD;
    if(x<-NOTE_W||x>W+NOTE_W) return;
    const y=n.lane*LH,col=LANE_COLORS[n.lane];
    c2d.save();
    if(n.isTeacher){
      // 先生ノート：点線枠＋半透明＋「見本」ラベル
      c2d.shadowColor=col;c2d.shadowBlur=8;
      c2d.strokeStyle=col;c2d.lineWidth=2;c2d.setLineDash([4,3]);
      c2d.strokeRect(x-NOTE_W/2,y+2,NOTE_W,LH-4);c2d.setLineDash([]);
      c2d.fillStyle=`rgba(255,255,255,.12)`;c2d.fillRect(x-NOTE_W/2,y+2,NOTE_W,LH-4);
      c2d.shadowBlur=0;c2d.fillStyle='rgba(255,255,255,.7)';
      c2d.font='bold 9px Arial';c2d.textAlign='center';
      c2d.fillText('見本',x,y+LH*.45);
      c2d.fillStyle=col;c2d.font='bold 13px Arial';
      c2d.fillText(LANE_LABELS[n.lane],x,y+LH*.78);
    } else {
      // プレイヤーノート：塗りつぶし＋白枠＋強めグロー＋「TAP」ラベル
      c2d.shadowColor=col;c2d.shadowBlur=24;
      c2d.fillStyle=col;c2d.fillRect(x-NOTE_W/2,y+2,NOTE_W,LH-4);
      c2d.shadowBlur=0;
      c2d.strokeStyle='rgba(255,255,255,.9)';c2d.lineWidth=2.5;
      c2d.strokeRect(x-NOTE_W/2,y+2,NOTE_W,LH-4);
      c2d.fillStyle='rgba(0,0,0,.85)';
      c2d.font='bold 9px Arial';c2d.textAlign='center';
      c2d.fillText('TAP',x,y+LH*.45);
      c2d.font='bold 13px Arial';
      c2d.fillText(LANE_LABELS[n.lane],x,y+LH*.78);
    }
    c2d.restore();
  });
}

const BASE_W={cool:.05,good:.12,bad:.22};
function getW(){const m=DIFFS[currentDiff].hitMul;return{cool:BASE_W.cool*m,good:BASE_W.good*m,bad:BASE_W.bad*m};}

function onButton(lane){
  if(!gameActive) return;
  // 先生フェーズ・イントロ中はプレイヤーのタップを受け付けない
  if(currentPhaseType!=='player') return;
  const now=actx.currentTime,songT=now-songStart,W=getW();
  const btn=document.querySelector(`.btn[data-lane="${lane}"]`);
  if(btn){btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),100);}
  let best=null,bestD=W.bad+.05;
  notes.forEach(n=>{if(n.isTeacher||n.hit||n.missed||n.lane!==lane)return;const d=Math.abs(songT-n.time);if(d<bestD){bestD=d;best=n;}});
  if(!best){hits.awful++;showPop('ミス','hp-awful');playMissSound();ratingScore=Math.max(0,ratingScore-8);updateRating();triggerReact(false);return;}
  let grade,cls;
  if(bestD<=W.cool)     {grade='クール！';cls='hp-cool';hits.cool++;ratingScore=Math.min(100,ratingScore+8);}
  else if(bestD<=W.good){grade='グッド！';cls='hp-good';hits.good++;ratingScore=Math.min(100,ratingScore+3);}
  else                   {grade='バッド';  cls='hp-bad'; hits.bad++; ratingScore=Math.max(0,ratingScore-3);}
  const gradeKey=bestD<=W.cool?'cool':bestD<=W.good?'good':'bad';
  best.hit=true;playHitVoice(now,lane,gradeKey);triggerReact(true);
  score+=cls==='hp-cool'?300:cls==='hp-good'?100:20;
  showPop(grade,cls);updateRating();
}
function showPop(txt,cls){const el=document.createElement('div');el.className='hit-pop '+cls;el.textContent=txt;document.body.appendChild(el);setTimeout(()=>el.remove(),650);}
function updateRating(){
  const fill=document.getElementById('rating-fill'),lbl=document.getElementById('rating-label'),sd=document.getElementById('score-disp');
  fill.style.width=ratingScore+'%';
  let r,c;
  if(ratingScore>=80){r='クール！';c='rl-cool';}else if(ratingScore>=55){r='グッド';c='rl-good';}else if(ratingScore>=30){r='バッド';c='rl-bad';}else{r='最悪';c='rl-awful';}
  lbl.textContent=r;lbl.className=c;sd.textContent=score;
}

function setFrame(id,f){const el=document.getElementById(id);el.classList.remove('s0','s1','s2','s3');el.classList.add('s'+f);}
function triggerReact(pos){
  const el=document.getElementById('player-sprite');
  el.classList.remove('sprite-singing','sprite-popping');void el.offsetWidth;
  if(pos){setFrame('player-sprite',2);el.classList.add('sprite-popping');setTimeout(()=>{el.classList.remove('sprite-popping');setFrame('player-sprite',currentPhaseType==='player'?1:0);if(currentPhaseType==='player')el.classList.add('sprite-singing');},350);}
  else{setFrame('player-sprite',3);setTimeout(()=>{setFrame('player-sprite',currentPhaseType==='player'?1:0);if(currentPhaseType==='player')el.classList.add('sprite-singing');},500);}
}
function updatePhase(beatNow){
  const pi=PHASES.findIndex(p=>beatNow>=p.start&&beatNow<p.end);
  if(pi<0||pi===lastPhaseIdx) return;
  lastPhaseIdx=pi;const ph=PHASES[pi];currentPhaseType=ph.type;
  document.getElementById('lyrics-text').textContent=ph.lyrics;
  const banner=document.getElementById('phase-banner');banner.textContent=ph.label;
  banner.className=ph.type==='player'?'player':ph.type==='teacher'?'teacher':'intro';
  const tEl=document.getElementById('teacher-sprite'),pEl=document.getElementById('player-sprite');
  if(ph.type==='teacher'){setFrame('teacher-sprite',1);tEl.classList.add('sprite-singing');setFrame('player-sprite',0);pEl.classList.remove('sprite-singing');}
  else if(ph.type==='player'){setFrame('teacher-sprite',0);tEl.classList.remove('sprite-singing');setFrame('player-sprite',1);pEl.classList.add('sprite-singing');}
  else{setFrame('teacher-sprite',0);tEl.classList.remove('sprite-singing');setFrame('player-sprite',0);pEl.classList.remove('sprite-singing');}
}

// ══════════════════════════════════════════════════
//  メインループ
// ══════════════════════════════════════════════════
function rafLoop(){
  if(!gameActive) return;
  const songT=actx.currentTime-songStart,beatNow=songT/B,W=getW();
  notes.forEach(n=>{
    if(!n.isTeacher&&!n.hit&&!n.missed&&n.time<songT-W.bad){
      n.missed=true;hits.awful++;ratingScore=Math.max(0,ratingScore-5);updateRating();triggerReact(false);
    }
  });
  // ゲージが0になったらゲームオーバー（プレイヤーフェーズ中のみ判定）
  if(ratingScore<=0&&currentPhaseType==='player'){
    if(isLocalAudioSong()) bgmStop();
    gameActive=false;
    showPop('ゲームオーバー！','hp-awful');
    setTimeout(()=>endSong(),800);
    return;
  }
  drawHighway(songT);updatePhase(beatNow);
  requestAnimationFrame(rafLoop);
}

// ══════════════════════════════════════════════════
//  ゲームライフサイクル
// ══════════════════════════════════════════════════
function applySprites(){
  const s=curSong(),teacher=getSongTeacher(s),player=selectedChar;
  document.getElementById('player-sprite').style.backgroundImage=`url('${CHAR_ASSETS[player]}')`;
  document.getElementById('teacher-sprite').style.backgroundImage=`url('${CHAR_ASSETS[teacher]}')`;
  document.getElementById('player-label').textContent=CHAR_LABELS[player]+'（あなた）';
  document.getElementById('teacher-label').textContent=CHAR_LABELS[teacher]+'（先生）';
  document.getElementById('result-char-sprite').style.backgroundImage=`url('${CHAR_ASSETS[player]}')`;
  document.getElementById('song-info-bar').textContent=`S${s.stage}-${s.idx+1} BPM${Math.round(s.bpm*DIFFS[currentDiff].bpmMul)}`;
}

function startGame(){
  bootAudio();
  const s=curSong(),diff=DIFFS[currentDiff];
  // MP3曲はbpmMul=1.0固定（音楽の速度が変わらないためゲームクロックも変えない）
  BPM=s.bpm*(s.audioSrc?1.0:diff.bpmMul); B=60/BPM; S=B/4; SONG_DUR=SONG_BEATS*B;
  PHASES=buildPhases();
  ['start','stage-select'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('game').style.display='flex';
  document.getElementById('result').style.display='none';
  applySprites();
  notes=makeChart();buildDrumEvents();buildMelodyEvents();
  score=0;hits={cool:0,good:0,bad:0,awful:0};ratingScore=50;
  lastPhaseIdx=-1;currentPhaseType='intro';schedPtr=0;melodyPtr=0;
  initCanvas();updateRating();
  document.getElementById('gvol').value=masterVol*100;
  if(isLocalAudioSong()){
    // 同じsrcを再代入するとHTMLMediaElementがリセットされてバッファが消えるため、
    // bgmCurrentSrcが異なる場合のみロードする
    preloadBgm(s.audioSrc);
    actx.resume().then(()=>{
      connectBgmToGraph(); // bgmAudioをmasterGainに接続（iOS音量制御対応）
      masterGain.gain.value=masterVol;
      const beatOfs=s.beatOffset||0;
      const seekPos=Math.max(0,beatOfs-.1);
      const delay=beatOfs-seekPos;
      const launch=()=>{
        songStart=actx.currentTime+delay;
        bgmAudio.currentTime=seekPos;
        bgmAudio.play().catch(()=>{});
        gameActive=true;scheduleSong();requestAnimationFrame(rafLoop);
      };
      // readyState>=2ならバッファ済み → 即開始。未ロードならcanplayを待つ
      if(bgmAudio.readyState>=2) launch();
      else bgmAudio.addEventListener('canplay',launch,{once:true});
    });
  } else {
    actx.resume().then(()=>{songStart=actx.currentTime+.1;gameActive=true;scheduleSong();requestAnimationFrame(rafLoop);});
  }
}

// ══ パーティクル ══
let ptcCanvas,ptcCtx,ptcAnimId,ptcList=[];
function initParticles(){
  ptcCanvas=document.getElementById('result-particles');
  ptcCtx=ptcCanvas.getContext('2d');
  ptcCanvas.width=window.innerWidth;ptcCanvas.height=window.innerHeight;
}
function spawnParticles(type){
  ptcList=[];
  if(type==='none') return;
  const colors=type==='cool'
    ?['#FFD166','#FF6BAD','#6BFF8A','#44AAFF','#fff','#FF5566']
    :type==='good'?['#6BFF8A','#44AAFF','#fff','#FFD166']
    :['#FF8844','#FFD166'];
  const count=type==='cool'?80:type==='good'?50:20;
  for(let i=0;i<count;i++){
    ptcList.push({
      x:Math.random()*ptcCanvas.width,y:Math.random()*ptcCanvas.height*.5,
      vx:(Math.random()-.5)*4,vy:Math.random()*3+1,
      r:Math.random()*6+3,col:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,rotV:(Math.random()-.5)*8,
      life:1,dec:Math.random()*.004+.003,
      shape:Math.random()<.5?'rect':'circle'
    });
  }
}
function runParticles(){
  ptcCtx.clearRect(0,0,ptcCanvas.width,ptcCanvas.height);
  ptcList=ptcList.filter(p=>p.life>0);
  ptcList.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.rot+=p.rotV; p.life-=p.dec;
    ptcCtx.save();ptcCtx.globalAlpha=p.life;ptcCtx.fillStyle=p.col;
    ptcCtx.translate(p.x,p.y);ptcCtx.rotate(p.rot*Math.PI/180);
    if(p.shape==='rect') ptcCtx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
    else{ptcCtx.beginPath();ptcCtx.arc(0,0,p.r,0,Math.PI*2);ptcCtx.fill();}
    ptcCtx.restore();
  });
  if(ptcList.length>0) ptcAnimId=requestAnimationFrame(runParticles);
  else ptcCtx.clearRect(0,0,ptcCanvas.width,ptcCanvas.height);
}
function stopParticles(){cancelAnimationFrame(ptcAnimId);ptcList=[];if(ptcCtx)ptcCtx.clearRect(0,0,9999,9999);}

// ══ スコアカウントアップ ══
function countUp(el,target,dur=900){
  const start=performance.now();
  const from=0;
  function tick(now){
    const t=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-t,3);
    el.textContent=Math.floor(from+(target-from)*ease).toLocaleString();
    if(t<1) requestAnimationFrame(tick);
    else el.textContent=target.toLocaleString();
  }
  requestAnimationFrame(tick);
}

function endSong(){
  gameActive=false;clearTimeout(schedTimer);cancelAutoAdv();
  if(isLocalAudioSong()) bgmStop();
  const s=curSong();
  const hitTotal=hits.cool+hits.good+hits.bad;
  const total=notes.filter(n=>!n.isTeacher).length;
  const passed=ratingScore>=30;
  if(passed) clearedSongs.add(s.id);
  totalScore+=score;

  let rankKey,rankEmoji,rankText,bgGrad,ptcType;
  if(ratingScore>=80){
    rankKey='cool';rankEmoji='🌟';rankText='クール！';
    bgGrad='linear-gradient(160deg,#3a1a00,#2a0a0e,#0a0a3e)';ptcType='cool';
  } else if(ratingScore>=55){
    rankKey='good';rankEmoji='👊';rankText='グッド！';
    bgGrad='linear-gradient(160deg,#002a10,#0a1a2e,#0a0a3e)';ptcType='good';
  } else if(ratingScore>=30){
    rankKey='bad';rankEmoji='😅';rankText='バッド...';
    bgGrad='linear-gradient(160deg,#1a0a00,#1a0a2e)';ptcType='spark';
  } else {
    rankKey='awful';rankEmoji='💀';rankText='ゲームオーバー';
    bgGrad='linear-gradient(160deg,#1a0000,#0a000a)';ptcType='none';
  }

  document.getElementById('game').style.display='none';
  const res=document.getElementById('result');
  res.style.display='flex';
  res.className='';res.classList.add('rank-'+rankKey);
  document.getElementById('result-bg').style.background=bgGrad;

  const sprEl=document.getElementById('result-char-sprite');
  sprEl.classList.remove('s0','s1','s2','s3','result-anim-enter','result-anim-bounce');
  void sprEl.offsetWidth;
  sprEl.classList.add(passed?'s2':'s3','result-anim-enter');
  setTimeout(()=>{ if(passed) sprEl.classList.add('result-anim-bounce'); },600);

  document.getElementById('result-rank-emoji').textContent=rankEmoji;
  const rankEl=document.getElementById('result-rank');
  rankEl.textContent=rankText;
  rankEl.classList.remove('rank-pop');void rankEl.offsetWidth;rankEl.classList.add('rank-pop');

  // 称号
  const tr=getTitle(totalScore);
  document.getElementById('result-title-emoji').textContent=tr.emoji;
  document.getElementById('result-title-text').textContent=tr.title;

  // 累計スコアカウントアップ
  countUp(document.getElementById('result-score-big'),totalScore,1000);

  document.getElementById('result-song-title').textContent=`♪ ${s.title}`;
  const hitRate=Math.round(hitTotal/Math.max(1,total)*100);
  document.getElementById('result-diff-line').textContent=
    `${DIFFS[currentDiff].label} — BPM ${Math.round(BPM)} — ヒット率 ${hitRate}% — 曲スコア ${score.toLocaleString()}`;

  const maxH=Math.max(hits.cool,hits.good,hits.bad,hits.awful,1);
  setTimeout(()=>{
    [['cool',hits.cool],['good',hits.good],['bad',hits.bad],['miss',hits.awful]].forEach(([k,v])=>{
      document.getElementById('bar-'+k).style.width=(v/maxH*100)+'%';
      document.getElementById('cnt-'+k).textContent=v;
    });
  },200);

  stopParticles();initParticles();spawnParticles(ptcType);
  if(ptcType!=='none') runParticles();

  const nextBtn=document.getElementById('next-song-btn');
  const clearBtn=document.getElementById('stage-clear-btn');
  const retryBtn=document.getElementById('retry-btn');
  [nextBtn,clearBtn,retryBtn].forEach(b=>b.classList.add('hidden'));

  if(passed){
    const stageSongs=SONGS.filter(sg=>sg.stage===s.stage).sort((a,b)=>a.idx-b.idx);
    const nextInStage=stageSongs.find(sg=>sg.idx===s.idx+1);
    const allCleared=stageSongs.every(sg=>clearedSongs.has(sg.id));

    if(nextInStage){
      // ステージ内の次の曲へ自動進行
      nextBtn.textContent=`▶ 次の曲「${nextInStage.title}」へ！`;
      nextBtn.classList.remove('hidden');
      // 次の曲がMP3ならリザルト表示中にプリロード（無音防止）
      if(nextInStage.audioSrc) preloadBgm(nextInStage.audioSrc);
      startAutoAdv(()=>{currentSongId=nextInStage.id;startGame();});
    } else if(allCleared&&s.stage<6){
      // 次のステージへ自動進行
      clearBtn.textContent=`🌟 ステージ${s.stage}クリア！次のステージへ`;
      clearBtn.classList.remove('hidden');
      const nextStageSongs=SONGS.filter(sg=>sg.stage===s.stage+1).sort((a,b)=>a.idx-b.idx);
      if(nextStageSongs[0].audioSrc) preloadBgm(nextStageSongs[0].audioSrc);
      startAutoAdv(()=>{currentSongId=nextStageSongs[0].id;startGame();});
    } else if(allCleared&&s.stage===6){
      // 全ステージ制覇
      clearBtn.textContent=`🎊 全ステージ制覇！伝説のリズム王者！`;
      clearBtn.classList.remove('hidden');
    } else {
      clearBtn.textContent=`🏆 ステージ${s.stage}クリア！`;
      clearBtn.classList.remove('hidden');
    }
  } else {
    retryBtn.classList.remove('hidden');
  }
}

// ステージ選択画面
function isStageUnlocked(stageNum){
  if(stageNum===1) return true;
  return SONGS.filter(s=>s.stage===stageNum-1).every(s=>clearedSongs.has(s.id));
}
function renderStageSelect(){
  const list=document.getElementById('stage-list');list.innerHTML='';
  STAGES.forEach(st=>{
    const unlocked=isStageUnlocked(st.id);
    const stageSongs=SONGS.filter(s=>s.stage===st.id);
    const teacher=st.teacher;
    const card=document.createElement('div');
    card.className='stage-card '+(unlocked?'unlocked':'locked');
    // 現在進行中ステージ判定
    const inProg=unlocked&&stageSongs.some(s=>!clearedSongs.has(s.id));
    if(inProg) card.classList.add('current-stage');
    const dots=stageSongs.map(s=>`<span class="sdot ${clearedSongs.has(s.id)?'done':'todo'}">${clearedSongs.has(s.id)?'●':'○'}</span>`).join('');
    card.innerHTML=`
      <div class="stage-info">
        <div class="stage-num">${st.emoji} STAGE ${st.id}</div>
        <div class="stage-name">${st.name}</div>
        <div class="stage-dots">${unlocked?dots:'🔒 前のステージをクリア'}</div>
      </div>
      <div class="stage-thumb" style="background-image:url('${CHAR_ASSETS[teacher]}')"></div>`;
    if(unlocked){
      card.addEventListener('click',()=>{
        const firstUnclear=stageSongs.sort((a,b)=>a.idx-b.idx).find(s=>!clearedSongs.has(s.id));
        currentSongId=(firstUnclear||stageSongs[0]).id;
        startGame();
      });
    }
    list.appendChild(card);
  });
}

// ══════════════════════════════════════════════════
//  入力・初期化
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  // キャラ選択
  document.querySelectorAll('.char-card').forEach(c=>{
    c.addEventListener('click',()=>{document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');selectedChar=c.dataset.char;});
  });
  // 難易度選択
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.addEventListener('click',()=>{document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');currentDiff=b.dataset.diff;});
  });
  // ボリューム（スタート画面）
  document.getElementById('vol-slider').addEventListener('input',e=>{masterVol=e.target.value/100;if(masterGain)masterGain.gain.value=masterVol;bgmAudio.volume=masterVol;});
  // ボリューム（ゲーム内）
  document.getElementById('gvol').addEventListener('input',e=>{masterVol=e.target.value/100;if(masterGain)masterGain.gain.value=masterVol;bgmAudio.volume=masterVol;document.getElementById('vol-slider').value=e.target.value;});
  // スタートボタン → ステージ選択へ（新セッション開始）
  document.getElementById('start-btn').addEventListener('click',()=>{
    bootAudio();
    totalScore=0; clearedSongs=new Set();
    document.getElementById('start').classList.add('hidden');
    document.getElementById('stage-select').classList.remove('hidden');
    renderStageSelect();
  });
  // ステージ選択 → 戻る
  document.getElementById('back-from-stage').addEventListener('click',()=>{
    document.getElementById('stage-select').classList.add('hidden');
    document.getElementById('start').classList.remove('hidden');
  });
  // リザルトボタン
  document.getElementById('next-song-btn').addEventListener('click',()=>{
    cancelAutoAdv();stopParticles();
    const s=curSong();const next=SONGS.find(sg=>sg.stage===s.stage&&sg.idx===s.idx+1);
    if(next){currentSongId=next.id;startGame();}
  });
  document.getElementById('stage-clear-btn').addEventListener('click',()=>{
    cancelAutoAdv();stopParticles();
    const s=curSong();const allCleared=SONGS.filter(sg=>sg.stage===s.stage).every(sg=>clearedSongs.has(sg.id));
    if(allCleared&&s.stage<6){
      const nextSongs=SONGS.filter(sg=>sg.stage===s.stage+1).sort((a,b)=>a.idx-b.idx);
      currentSongId=nextSongs[0].id;startGame();
    } else {
      document.getElementById('result').style.display='none';
      document.getElementById('stage-select').classList.remove('hidden');
      renderStageSelect();
    }
  });
  document.getElementById('retry-btn').addEventListener('click',()=>{cancelAutoAdv();stopParticles();startGame();});
  document.getElementById('title-btn').addEventListener('click',()=>{
    cancelAutoAdv();stopParticles();
    gameActive=false;clearTimeout(schedTimer);
    document.getElementById('result').style.display='none';
    document.getElementById('stage-select').classList.remove('hidden');
    renderStageSelect();
  });
  // ゲームボタン
  document.querySelectorAll('.btn').forEach(btn=>{
    const lane=parseInt(btn.dataset.lane);
    btn.addEventListener('touchstart',e=>{e.preventDefault();onButton(lane);},{passive:false});
    btn.addEventListener('mousedown',e=>{e.preventDefault();onButton(lane);});
  });
  // キーボード
  const keyMap={'a':0,'ArrowLeft':0,'s':1,'ArrowUp':1,'d':2,'ArrowRight':2,' ':3,'ArrowDown':3};
  document.addEventListener('keydown',e=>{if(keyMap[e.key]!==undefined){e.preventDefault();onButton(keyMap[e.key]);}});
  // AudioContext再開
  document.addEventListener('touchstart',()=>{if(actx&&actx.state==='suspended')actx.resume();},{passive:true});
  // リサイズ
  window.addEventListener('resize',()=>{if(canvas)canvas.width=window.innerWidth;});
});
